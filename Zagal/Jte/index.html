<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zagal - Monitoreo Riego</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <link rel="stylesheet" href="styles.css" />

    <link rel="icon" type="image/png" href="./logoJte.png" />
  </head>
  <body class="bg-light d-flex flex-column" style="min-height: 100vh">
    <nav
      class="navbar navbar-expand-lg navbar-light bg-white rounded shadow-sm mt-2 mx-auto px-3"
      style="width: 95%; max-width: 100%"
    >
      <div
        class="container-fluid d-flex flex-wrap align-items-center justify-content-between gap-2"
      >
        <a
          class="navbar-brand d-flex align-items-center gap-2 mb-0 text-decoration-none"
          href="#"
        >
          <img src="logoJte.png" alt="logo" width="40" height="24" />
          <img src="LogoZagal.png" alt="logo" width="60" height="60" />
          <div class="d-flex flex-column align-items-start text-dark">
            <span class="h4 mb-0">Agrícola Zagal</span>
            <small class="text-muted">Sistema de Monitoreo Riego</small>
          </div>
        </a>
      </div>
    </nav>

    <div class="container py-5 text-center flex-grow-1">
      <h3 class="mb-5">Navegar al Monitoreo de Parcelas</h3>

      <div class="row justify-content-center g-4">
        <div class="col-lg-4 col-md-5 col-sm-8">
          <div class="card card-click" id="card57">
            <div id="map-57" class="map-container"></div>

            <div class="card-body">
              <h3 class="card-title">Parcela 57</h3>
              <div
                id="info-57"
                class="info-box d-flex align-items-center justify-content-center"
              >
                <div
                  class="spinner-border text-primary spinner-border-sm"
                  role="status"
                ></div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4 col-md-5 col-sm-8">
          <div class="card card-click" id="card18">
            <div id="map-18" class="map-container"></div>

            <div class="card-body">
              <h3 class="card-title">Parcela 18</h3>
              <div
                id="info-18"
                class="info-box d-flex align-items-center justify-content-center"
              >
                <div
                  class="spinner-border text-primary spinner-border-sm"
                  role="status"
                ></div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4 col-md-5 col-sm-8">
          <div class="card card-click" id="card82">
            <div id="map-82" class="map-container"></div>

            <div class="card-body">
              <h3 class="card-title">Parcela 82</h3>
              <div
                id="info-82"
                class="info-box d-flex align-items-center justify-content-center"
              >
                <div
                  class="spinner-border text-primary spinner-border-sm"
                  role="status"
                ></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer
      class="d-flex flex-wrap justify-content-between align-items-center py-3 px-4 border-top mt-4 mx-auto"
      style="max-width: 1500px; width: 100%"
    >
      <p class="mb-2 mb-md-0 text-body-secondary">&copy; 2025 JTE Analytics.</p>
      <img
        src="logoJte.png"
        alt="logo"
        width="40"
        height="24"
        class="ms-0 ms-md-auto"
      />
    </footer>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script src="main.js"></script>
  </body>
</html>
